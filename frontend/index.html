<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personal Finance</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: { DEFAULT: '#6366f1', dark: '#4f46e5' }
          }
        }
      }
    }
  </script>
  <style>
    [x-cloak] { display: none !important; }
    .fade-in { animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">

  <!-- Nav -->
  <nav class="bg-white border-b border-gray-200 sticky top-0 z-10">
    <div class="max-w-4xl mx-auto px-4 flex items-center justify-between h-14">
      <span class="font-semibold text-lg text-indigo-600">💰 MyFinance</span>
      <div class="flex gap-1">
        <button onclick="showPage('dashboard')" id="nav-dashboard"
          class="nav-btn px-4 py-1.5 rounded-lg text-sm font-medium transition">Dashboard</button>
        <button onclick="showPage('transactions')" id="nav-transactions"
          class="nav-btn px-4 py-1.5 rounded-lg text-sm font-medium transition">Transactions</button>
        <button onclick="showPage('budgets')" id="nav-budgets"
          class="nav-btn px-4 py-1.5 rounded-lg text-sm font-medium transition">Budgets</button>
      </div>
    </div>
  </nav>

  <main class="max-w-4xl mx-auto px-4 py-6">

    <!-- ── Transactions Page ── -->
    <div id="page-transactions" class="page hidden">
      <div class="flex items-center justify-between mb-5">
        <div>
          <h1 class="text-xl font-semibold">Transactions</h1>
          <p class="text-sm text-gray-500 mt-0.5">Log and manage your expenses</p>
        </div>
        <div class="flex items-center gap-3">
          <input type="month" id="month-picker" class="border border-gray-200 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300" />
          <button onclick="openModal()" class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium px-4 py-2 rounded-lg transition">
            + Add Expense
          </button>
        </div>
      </div>

      <!-- Summary strip -->
      <div class="bg-white border border-gray-200 rounded-xl px-5 py-4 mb-5 flex gap-8">
        <div>
          <p class="text-xs text-gray-500 uppercase tracking-wide">Total Spent</p>
          <p id="total-spent" class="text-2xl font-bold text-gray-800 mt-0.5">$0.00</p>
        </div>
        <div>
          <p class="text-xs text-gray-500 uppercase tracking-wide">Transactions</p>
          <p id="total-count" class="text-2xl font-bold text-gray-800 mt-0.5">0</p>
        </div>
      </div>

      <!-- Expense list -->
      <div id="expense-list" class="space-y-2">
        <div class="text-center py-12 text-gray-400 text-sm" id="empty-state">
          No expenses this month. Add your first one!
        </div>
      </div>
    </div>

    <!-- ── Dashboard Page (placeholder) ── -->
    <div id="page-dashboard" class="page hidden">
      <div class="flex items-center justify-center h-64 text-gray-400 text-sm">Dashboard — coming soon</div>
    </div>

    <!-- ── Budgets Page (placeholder) ── -->
    <div id="page-budgets" class="page hidden">
      <div class="flex items-center justify-center h-64 text-gray-400 text-sm">Budgets — coming soon</div>
    </div>

  </main>

  <!-- ── Add / Edit Modal ── -->
  <div id="modal" class="fixed inset-0 bg-black/40 flex items-center justify-center z-50 hidden">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md mx-4 fade-in">
      <div class="flex items-center justify-between px-6 pt-5 pb-4 border-b border-gray-100">
        <h2 id="modal-title" class="font-semibold text-base">Add Expense</h2>
        <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-xl leading-none">&times;</button>
      </div>
      <form id="expense-form" onsubmit="submitExpense(event)" class="px-6 py-5 space-y-4">
        <input type="hidden" id="expense-id" />

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Amount (₹)</label>
          <input type="number" id="field-amount" step="0.01" min="0.01" required
            class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300"
            placeholder="0.00" />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Category</label>
          <select id="field-category" required
            class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300">
            <option value="">Select category</option>
            <option>Housing</option>
            <option>Food & Dining</option>
            <option>Transport</option>
            <option>Health</option>
            <option>Entertainment</option>
            <option>Shopping</option>
            <option>Utilities</option>
            <option>Other</option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Date</label>
          <input type="date" id="field-date" required
            class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300" />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Note <span class="text-gray-400 font-normal">(optional)</span></label>
          <input type="text" id="field-note"
            class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300"
            placeholder="e.g. Lunch with team" />
        </div>

        <div class="flex justify-end gap-3 pt-1">
          <button type="button" onclick="closeModal()" class="px-4 py-2 text-sm text-gray-600 hover:text-gray-800 transition">Cancel</button>
          <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium px-5 py-2 rounded-lg transition">
            Save
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- ── Delete Confirm Modal ── -->
  <div id="delete-modal" class="fixed inset-0 bg-black/40 flex items-center justify-center z-50 hidden">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm mx-4 fade-in p-6">
      <h2 class="font-semibold text-base mb-2">Delete Expense?</h2>
      <p class="text-sm text-gray-500 mb-5">This cannot be undone.</p>
      <div class="flex justify-end gap-3">
        <button onclick="closeDeleteModal()" class="px-4 py-2 text-sm text-gray-600 hover:text-gray-800 transition">Cancel</button>
        <button onclick="confirmDelete()" class="bg-red-500 hover:bg-red-600 text-white text-sm font-medium px-5 py-2 rounded-lg transition">Delete</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
